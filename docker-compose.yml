services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: patch_postgis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patch_postgis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
